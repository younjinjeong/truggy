name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels:
  - enhancement
body:
  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Why is this needed?
      description: What problem does this solve?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Perception
        - Planning (MPPI)
        - State Estimation
        - Actuation
        - Build System
        - Simulation
        - Documentation
        - Other
    validations:
      required: true
